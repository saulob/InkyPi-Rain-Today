<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div style="margin-bottom:14px;">
    <div style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size:1em; color:var(--text-primary); font-weight:500; background:var(--bg-secondary); padding:12px 14px; border-left:3px solid var(--border-color); border-radius:2px; line-height:1.4; max-width:100%;">
        Shows today's rain forecast with chance percentage, humidity and precipitation rate
    </div>
</div>

<div class="form-group">
    <label for="language" class="form-label">Language:</label>
    <select id="language" name="language" class="form-input">
        <option value="nl">Dutch</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="id">Indonesian</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="es">Spanish</option>
    </select>
</div>

<div class="form-group">
    <label for="quickLocation" class="form-label">Quick Location:</label>
    <select id="quickLocation" name="quickLocation" class="form-input">
        <option value="">Select a city...</option>
        <option value="52.3676,4.9041">Amsterdam</option>
        <option value="52.5200,13.4050">Berlin</option>
        <option value="-34.6037,-58.3816">Buenos Aires</option>
        <option value="-6.2088,106.8456">Jakarta</option>
        <option value="51.5074,-0.1278">London</option>
        <option value="40.4168,-3.7038">Madrid</option>
        <option value="40.7128,-74.0060">New York</option>
        <option value="48.8566,2.3522">Paris</option>
        <option value="-22.9068,-43.1729">Rio de Janeiro</option>
        <option value="41.9028,12.4964">Rome</option>
        <option value="-23.5505,-46.6333">São Paulo</option>
        <option value="35.6762,139.6503">Tokyo</option>
    </select>
</div>

<div class="form-group">
    <label class="form-label">Location:</label>
    <div class="form-group">
        <span>Latitude</span>
        <input type="text" id="latitude" name="latitude" class="form-input" />
    </div>
    <div class="form-group">
        <span>Longitude</span>
        <input type="text" id="longitude" name="longitude" class="form-input" />
    </div>
    <button type="button" id="openMap" class="action-button compact">Select Location</button>
</div>

<div class="form-group">
    <label for="weatherProvider" class="form-label">Weather Provider:</label>
    <select id="weatherProvider" name="weatherProvider" class="form-input">
        <option value="OpenMeteo">Open-Meteo</option>
        <option value="OpenWeatherMap">OpenWeatherMap</option>
    </select>

    <label for="units" class="form-label">Units:</label>
    <select id="units" name="units" class="form-input">
        <option value="imperial">Imperial (°F)</option>
        <option value="metric">Metric (°C)</option>
        <option value="standard">Standard (K)</option>
    </select>
</div>

<div id="mapModal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="closeModal('mapModal')">×</span>
        <h2 id="modalTitle">Select Location</h2>
        <div class="separator"></div>
        <div id="map" style="width: 100%; height: 200px; margin: 10px 0px;"></div>
        <button id="closeMap" class="action-button">Save</button>
    </div>
</div>

<script>
    function updateProviderState() {
        const apiKeyLabel = document.querySelector('.api-key-label');
        const provider = document.getElementById('weatherProvider').value;

        if (apiKeyLabel) {
            apiKeyLabel.style.display = provider === 'OpenMeteo' ? 'none' : '';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const OSM_TILE_URL = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        const $latitude = document.querySelector('#latitude');
        const $longitude = document.querySelector('#longitude');
        const $openMap = document.querySelector('#openMap');
        const $closeMap = document.querySelector('#closeMap');
        const $quickLocation = document.querySelector('#quickLocation');

        const $weatherProvider = document.querySelector('#weatherProvider');

        let latitude = Number($latitude.value) || 0;
        let longitude = Number($longitude.value) || 0;
        let zoom = $latitude.value && $longitude.value ? 4.5 : 2.5;
        let weatherProvider = 'OpenMeteo';
        let map;
        let marker;

        $weatherProvider.addEventListener('change', updateProviderState);

        $openMap.addEventListener('click', () => {
            const parsedLat = Number($latitude.value);
            const parsedLong = Number($longitude.value);
            if (Number.isFinite(parsedLat) && Number.isFinite(parsedLong)) {
                latitude = parsedLat;
                longitude = parsedLong;
            }
            zoom = ($latitude.value && $longitude.value) ? 4.5 : 2.5;

            openModal('mapModal');
            setTimeout(() => {
                if (!map) {
                    map = L.map('map').setView([latitude, longitude], zoom);
                    L.tileLayer(OSM_TILE_URL).addTo(map);
                    marker = L.marker([latitude, longitude], { draggable: true }).addTo(map);
                    map.on('click', (event) => { marker.setLatLng(event.latlng); });
                } else {
                    map.invalidateSize();
                    map.setView([latitude, longitude], zoom);
                    marker.setLatLng([latitude, longitude]);
                }
            }, 100);
        });

        $closeMap.addEventListener('click', () => {
            const position = marker.getLatLng().wrap();
            latitude = position.lat;
            longitude = position.lng;
            $latitude.value = latitude;
            $longitude.value = longitude;

            if ($quickLocation) {
                $quickLocation.value = '';
                $quickLocation.dispatchEvent(new Event('change'));
            }
            closeModal('mapModal');
        });

        $quickLocation.addEventListener('change', () => {
            if (!$quickLocation.value) return;
            const [quickLat, quickLong] = $quickLocation.value.split(',').map(Number);
            if (Number.isFinite(quickLat) && Number.isFinite(quickLong)) {
                latitude = quickLat;
                longitude = quickLong;
                $latitude._settingFromQuickLocation = true;
                $longitude._settingFromQuickLocation = true;
                $latitude.value = quickLat.toFixed(4);
                $longitude.value = quickLong.toFixed(4);
                $latitude._settingFromQuickLocation = false;
                $longitude._settingFromQuickLocation = false;
            }
        });

        [$latitude, $longitude].forEach((field) => {
            field.addEventListener('input', () => {
                if (field._settingFromQuickLocation) return;
                if ($quickLocation.value !== '') {
                    $quickLocation.value = '';
                }
            });
        });

        if (loadPluginSettings) {
            document.getElementById('language').value = pluginSettings.language || 'en';
            const $language = document.getElementById('language');
            if (!$language.querySelector(`option[value="${pluginSettings.language}"]`)) {
                $language.value = 'en';
            }
            document.getElementById('quickLocation').value = pluginSettings.quickLocation || '';
            if (!$quickLocation.querySelector(`option[value="${pluginSettings.quickLocation}"]`)) {
                $quickLocation.value = '';
            }
            document.getElementById('latitude').value = pluginSettings.latitude || '';
            document.getElementById('longitude').value = pluginSettings.longitude || '';
            weatherProvider = pluginSettings.weatherProvider || 'OpenMeteo';
            document.getElementById('weatherProvider').value = weatherProvider;
            document.getElementById('units').value = pluginSettings.units || 'imperial';

        } else {
            document.getElementById('language').value = 'en';
            document.getElementById('quickLocation').value = '';
            document.getElementById('units').value = 'imperial';
        }

        document.getElementById('weatherProvider').value = weatherProvider;
        updateProviderState();

        latitude = Number(document.getElementById('latitude').value) || 0;
        longitude = Number(document.getElementById('longitude').value) || 0;
        zoom = document.getElementById('latitude').value && document.getElementById('longitude').value ? 4.5 : 2.5;
    });
</script>
